services:
  capability-postgres:
    image: postgres:15-alpine
    container_name: capability-postgres
    environment:
      POSTGRES_DB: ${CAPABILITY_POSTGRES_DB:-capability}
      POSTGRES_USER: ${CAPABILITY_POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${CAPABILITY_POSTGRES_PASSWORD:-postgres}
    ports:
      - "${CAPABILITY_POSTGRES_NODEPORT:-5432}:5432"
    volumes:
      - capability-postgres:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${CAPABILITY_POSTGRES_USER:-postgres}" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - beeatlas-network

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: rabbitmq
    user: "rabbitmq:rabbitmq"
    restart: unless-stopped
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-guest}
      RABBITMQ_ERLANG_COOKIE: ${RABBITMQ_ERLANG_COOKIE:-secret-cookie-for-dev}
    command: >
      sh -c "
        rabbitmq-server &
        sleep 20;
        rabbitmqadmin declare queue name=tech_capability_queue durable=true;
        rabbitmqadmin declare queue name=business_capability_queue durable=true;
        rabbitmqadmin declare queue name=package_queue durable=true;
        rabbitmqadmin declare queue name=tc_description_quality durable=true;
        rabbitmqadmin declare queue name=bc_entry_in_sparx durable=true;
        rabbitmqadmin declare queue name=product_availability durable=true;
        rabbitmqadmin declare queue name=error_bc_entry_in_sparx durable=true;
        wait
      "
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: [ "CMD", "rabbitmq-diagnostics", "ping" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - beeatlas-network

  capability-backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: capability-backend-app
    depends_on:
      capability-postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy   # ← ждать готовности RabbitMQ
    environment:
      SPRING_RABBITMQ_VIRTUAL_HOST: ${RABBITMQ_VHOST:-/}
      SPRING_RABBITMQ_TEMPLATE_EXCHANGE: ${RABBITMQ_EXCHANGE:-capability.exchange}
      SPRING_RABBITMQ_TEMPLATE_ROUTING_KEY: ${RABBITMQ_ROUTING_KEY:-capability.routing}
      SPRING_RABBITMQ_HOST: ${RABBITMQ_HOST:-rabbitmq}
      SPRING_RABBITMQ_PORT: ${RABBITMQ_PORT:-5672}
      SPRING_RABBITMQ_USERNAME: ${RABBITMQ_USER:-guest}
      SPRING_RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-guest}
      SPRING_DATASOURCE_URL: jdbc:postgresql://${CAPABILITY_POSTGRES_HOST:-capability-postgres}:5432/${CAPABILITY_POSTGRES_DB:-capability}
      SPRING_DATASOURCE_USERNAME: ${CAPABILITY_POSTGRES_USER:-postgres}
      SPRING_DATASOURCE_PASSWORD: ${CAPABILITY_POSTGRES_PASSWORD:-postgres}
      SPRING_JPA_HIBERNATE_DDL_AUTO: none
      SPRING_JPA_PROPERTIES_HIBERNATE_DEFAULT_SCHEMA: capability
      SPRING_FLYWAY_DEFAULT_SCHEMA: capability
      SPRING_FLYWAY_BASELINE_ON_MIGRATE: "true"
      SPRING_FLYWAY_CLEAN_DISABLED: "true"
      INTEGRATION_NOTIFICATION_SERVER_URL: "http://notification-service" # добавить адрес
      INTEGRATION_DOCUMENT_SERVER_URL: "http://document-service"
      INTEGRATION_PRODUCT_SERVER_URL: "http://products-service"
      INTEGRATION_BPM_SERVER_URL: "http://bpm-service"
      INTEGRATION_PACK_LOADER_SERVER_URL: "http://pack-loader-service"
      INTEGRATION_DASHBOARD_SERVER_URL: "http://dashboard-service"
      INTEGRATION_AUTH_SERVER_URL: "http://auth-service"
      INTEGRATION_AI_TOOL_SERVER_URL: "http://ai-tool-service"
      INTEGRATION_AUTHSSO_SERVER_URL: "http://auth-service"
      timeout: 3s
      retries: 15
    ports:
      - "${CAPABILITY_SERVICE_PORT:-8081}:8080"
    networks:
      - beeatlas-network
    restart: unless-stopped

networks:
  beeatlas-network:
    driver: bridge

volumes:
  capability-postgres:
  rabbitmq_data: